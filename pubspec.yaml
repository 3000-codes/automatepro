name: automatepro
description: "跨平台自动点击器 - A cross-platform auto clicker application"
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  
  # Routing
  go_router: ^14.8.1
  
  # Window Management
  window_manager: ^0.4.3
  desktop_multi_window: ^0.3.0
  
  # Keyboard & Mouse Simulation
  mouse: ^1.0.1
  
  # Utilities
  equatable: ^2.0.7
  uuid: ^4.5.1
  intl: ^0.20.2
  
  # Hotkey
  hotkey_manager: ^0.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
